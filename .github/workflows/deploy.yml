name: Deploy Application

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: inventory-prod
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Code to Production Server
        run: |
          # Ididirekta sa tamang folder name ng project mo
          cd /var/www/project-name

          git fetch origin
          git reset --hard origin/main

          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

          php artisan migrate --force
          php artisan optimize:clear
          php artisan optimize
          php artisan queue:restart

  deploy-staging:
    name: Deploy to Staging
    runs-on: inventory-staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy Code to Staging Server
        run: |
          # Ididirekta sa staging folder ng project mo
          cd /var/www/project-name_staging

          git fetch origin
          git reset --hard origin/develop

          composer install --no-interaction
          npm ci
          npm run build

          php artisan migrate --force
          php artisan optimize:clear
          php artisan optimize
          php artisan queue:restart